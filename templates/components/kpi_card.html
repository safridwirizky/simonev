<div class="card shadow-sm border-0 h-100">

    <div class="card-body">

        <div class="text-muted small">

            {{ title }}

        </div>

        <h3 class="fw-bold mt-2">

            {{ value }}

            {% if subtitle %}

                <small class="text-muted">

                    {{ subtitle }}

                </small>

            {% endif %}

        </h3>

    </div>

</div>
