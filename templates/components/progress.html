<div class="d-flex align-items-center gap-3">

    <div class="progress flex-grow-1">

        <div
            class="progress-bar {{ status.color }}"
            data-progress="{{ status.value }}"
        ></div>

    </div>

    <span
        class="fw-semibold text-nowrap"
        title="
Target : {{ status.target.display }}
&#10;Realisasi : {{ status.realisasi.display }}
&#10;{{ status.label }}
"
    >

        {{ status.display }}

    </span>

</div>
